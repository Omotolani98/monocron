version: "2"
sql:
  - engine: "postgresql"
    schema: "./db/migrations"
    queries: "db/queries"
    
    gen:
      go:
        package: db
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int"
          - db_type: "pg_catalog.text"
            nullable: true
            go_type:
              type: "string"
          - db_type: "pg_catalog.bool"
            nullable: true
            go_type:
              type: "bool"
          - db_type: "pg_catalog.interval"
            nullable: true
            go_type:
              import: "time"
              type: "Duration"
